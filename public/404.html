<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <script>
      var path = window.location.pathname;
      var search = window.location.search;
      var hash = window.location.hash;
      var base = '/quick-discovery-hub-89';
      var redirect = base + '/?p=' + encodeURIComponent(path.slice(base.length) + search) + hash;
      window.location.replace(redirect);
    </script>
  </head>
  <body></body>
</html>
